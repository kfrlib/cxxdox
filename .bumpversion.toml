[tool.bumpversion]
# Single source of truth for the package version.
# Bump with:  bump-my-version bump <part>   (part = patch | minor | major)
# This updates every file listed below, commits, and tags v<new_version>.
current_version = "0.1.5"
commit = true
tag = true
tag_name = "v{new_version}"
tag_message = "Bump version: {current_version} → {new_version}"
allow_dirty = false
commit_message = "Bump version: {current_version} → {new_version}"

[[tool.bumpversion.files]]
filename = "setup.py"
search = "version='{current_version}'"
replace = "version='{new_version}'"

[[tool.bumpversion.files]]
filename = "README.md"

[[tool.bumpversion.files]]
filename = "demo/docs/index.md"
