name: Build wheels

# Builds platform-specific wheels for mkdocs-cxxdox.
#
# Each wheel bundles the matching libclang binary, which is extracted from the
# official LLVM release archive on GitHub
# (https://github.com/llvm/llvm-project/releases). The libclang version is
# controlled by the LLVM_VERSION env var below — change it in one place to bump
# the bundled binary for every platform.
#
# Wheels are uploaded as build artifacts and, on tagged releases, attached to
# the GitHub Release so users can install with:
#   pip install <wheel-url-from-release>

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write  # required to attach wheels to a GitHub Release

# === Bump the bundled libclang version by changing only this line. ===
# This is the single source of truth; the prepare job below substitutes it
# into every platform's archive asset name and in-archive path.
env:
  LLVM_VERSION: '21.1.6'

jobs:
  prepare:
    name: Prepare build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        shell: python
        run: |
          import json, os
          v = os.environ["LLVM_VERSION"]
          # Each entry maps a runner to the official LLVM archive asset name
          # and the path of libclang inside that archive. The version is
          # substituted here (env context is NOT available in strategy.matrix,
          # so we bake it in at this step).
          entries = [
              {
                  "os": "windows-latest",
                  "arch": "x64",
                  "wheel_tag": "win_amd64",
                  "llvm_asset": f"clang+llvm-{v}-x86_64-pc-windows-msvc.tar.xz",
                  "libclang_in_archive": f"clang+llvm-{v}-x86_64-pc-windows-msvc/bin/libclang.dll",
                  "staged_name": "libclang.dll",
              },
              {
                  "os": "ubuntu-latest",
                  "arch": "x64",
                  # NOTE: must be a PEP 600 tag with a glibc version —
                  # bare `manylinux_x86_64` is NOT recognized by pip and
                  # wheels tagged with it fail to install. manylinux_2_17
                  # (glibc 2.17 / CentOS 7) is the most broadly compatible.
                  "wheel_tag": "manylinux_2_17_x86_64",
                  "llvm_asset": f"LLVM-{v}-Linux-X64.tar.xz",
                  # Linux release ships a versioned soname, e.g. libclang.so.21.1.6
                  "libclang_in_archive": f"LLVM-{v}-Linux-X64/lib/libclang.so.{v}",
                  "staged_name": "libclang.so",
              },
              # Additional OS/archs can be added here (e.g. ubuntu-arm, macos-latest).
          ]
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write("matrix=" + json.dumps({"include": entries}) + "\n")

  build:
    name: Build wheel (${{ matrix.os }} / ${{ matrix.arch }})
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build wheel setuptools twine

      - name: Download official LLVM archive
        # Download the prebuilt LLVM archive for this platform from the
        # llvm/llvm-project GitHub release tagged llvmorg-<version>.
        shell: bash
        run: |
          set -euo pipefail
          asset="${{ matrix.llvm_asset }}"
          url="https://github.com/llvm/llvm-project/releases/download/llvmorg-${LLVM_VERSION}/${asset}"
          echo "Downloading $url"
          curl -fL --retry 3 -o llvm.tar.xz "$url"
          ls -la llvm.tar.xz

      - name: Extract libclang from archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p llvm-extract
          tar -xJf llvm.tar.xz --wildcards -C llvm-extract "*/${{ matrix.staged_name }}*"
          found="$(find llvm-extract -type f -name '${{ matrix.staged_name }}*' | head -n1)"
          test -n "$found" || { echo "libclang not found after extraction"; exit 1; }
          echo "libclang_path=$found" >> "$GITHUB_ENV"

      - name: Stage libclang binary into package
        shell: bash
        run: |
          set -euo pipefail
          dest="cxxdox_plugin/libclang21"
          mkdir -p "$dest"
          cp "$libclang_path" "$dest/${{ matrix.staged_name }}"
          ls -la "$dest"

      - name: Build wheel
        run: |
          python -m pip wheel . --no-deps -w wheelhouse/

      # The package is pure-Python, so setuptools tags every wheel as
      # `py3-none-any`. But each wheel bundles a platform-specific libclang
      # binary, so it must carry a real platform tag — otherwise the Windows
      # and Linux wheels end up with identical filenames and clobber each
      # other when artifacts are merged for the release.
      - name: Retag wheel with platform tag
        shell: bash
        run: |
          # --platform-tag replaces the wheel's platform tag set, so the
          # default `any` is dropped automatically (no need for --remove).
          # `wheel tags` writes a new file but leaves the original on disk,
          # so we must delete the `any` wheel ourselves — otherwise the
          # upload-artifact glob below picks up both, and the mis-tagged
          # `any` wheel would still collide across platforms in the release.
          python -m wheel tags \
            --platform-tag '${{ matrix.wheel_tag }}' \
            wheelhouse/*.whl
          rm -f wheelhouse/*-any.whl
          ls -la wheelhouse/

      - name: Check wheel metadata
        run: |
          python -m twine check wheelhouse/*.whl

      - name: List built wheels
        shell: bash
        run: |
          ls -la wheelhouse/
          for w in wheelhouse/*.whl; do echo "  $w"; done

      # Smoke-test the wheel before uploading it. This catches packaging bugs
      # early
      - name: Test-install wheel
        shell: bash
        run: |
          set -euo pipefail
          # Install the wheel WITH deps (mkdocs, parsimonious, ...) to make
          # sure install_requires resolves and the plugin loads.
          python -m pip install wheelhouse/*.whl
          python "${GITHUB_WORKSPACE}/.github/workflows/smoke_test.py"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.wheel_tag }}
          path: wheelhouse/*.whl
          if-no-files-found: error
          retention-days: 30

  release:
    name: Attach wheels to release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: wheels
          merge-multiple: true

      - name: List downloaded wheels
        run: ls -la wheels/

      - name: Attach wheels to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: wheels/*.whl
          generate_release_notes: true
          fail_on_unmatched_files: true

  pages:
    name: Build & publish demo to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    # Build the demo site from the main branch and from tagged releases.
    # Pages deployment requires the repo to have Pages enabled with the
    # "GitHub Actions" source in Settings → Pages.
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    # Pushing a tag that sits on main triggers two workflow runs at once
    # (one for the branch push, one for the tag push). Both would deploy to
    # the same Pages environment and race. This concurrency group ensures
    # only one Pages deployment runs at a time; the later-triggered run
    # cancels the earlier one. Content is identical because the tag points
    # at the same commit as main, so it doesn't matter which wins.
    concurrency:
      group: pages
      cancel-in-progress: true

    permissions:
      pages: write        # required to deploy to Pages
      id-token: write     # required to use the Pages deployment action
      contents: read

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build wheel setuptools

      - name: Download built wheel (Linux x64)
        uses: actions/download-artifact@v4
        with:
          name: wheel-manylinux_2_17_x86_64
          path: wheelhouse

      - name: Install plugin from wheel + demo deps
        run: |
          # Install the freshly built wheel (bundles libclang.so for Linux).
          pip install wheelhouse/mkdocs_cxxdox-*.whl
          # Material theme + extras used by demo/mkdocs.yml.
          pip install 'mkdocs-material>=9.1.15'

      - name: Build demo site
        working-directory: demo
        run: mkdocs build --clean

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: demo/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
